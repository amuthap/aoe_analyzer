<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AOE2 Game Coach</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="app">
        <header class="header">
            <div class="header-content">
                <div class="logo">
                    <span class="logo-icon">&#9876;</span>
                    <h1>AOE2 Game Coach</h1>
                </div>
                <p class="tagline">Drop your replay. Get better.</p>
            </div>
        </header>

        <!-- Upload -->
        <section id="upload-section" class="upload-section">
            <div class="upload-zone" id="drop-zone">
                <div class="upload-icon">&#128230;</div>
                <h2>Drop your replay file here</h2>
                <p>or click to browse</p>
                <p class="file-types">.aoe2record &bull; .mgz &bull; .mgx</p>
                <input type="file" id="file-input" accept=".aoe2record,.mgz,.mgx,.mgl" hidden>
            </div>
            <div class="upload-options">
                <label for="focus-player">Your in-game name (optional):</label>
                <input type="text" id="focus-player" placeholder="e.g. TheViper" autocomplete="off">
            </div>
        </section>

        <!-- Loading -->
        <section id="loading-section" class="loading-section hidden">
            <div class="spinner"></div>
            <p>Analyzing your game...</p>
        </section>

        <!-- Results -->
        <section id="results-section" class="results-section hidden">
            <!-- Game Overview -->
            <div class="card game-overview">
                <h2>&#127942; Game Overview</h2>
                <div class="overview-grid" id="overview-grid"></div>
            </div>

            <!-- AI Analysis - TOP POSITION -->
            <div class="card ai-card" id="ai-card">
                <div class="ai-header">
                    <h2>&#129302; AI Coach (Qwen)</h2>
                    <div class="ai-buttons" id="ai-buttons"></div>
                </div>
                <div id="ai-loading" class="hidden">
                    <div class="spinner small-spinner"></div>
                    <span id="ai-loading-text">Qwen is analyzing...</span>
                </div>
                <div id="ai-results-container"></div>
            </div>

            <!-- Battle Timeline -->
            <div class="card" id="battle-card">
                <h2>&#9876; Battle Timeline</h2>
                <div id="battle-timeline"></div>
            </div>

            <!-- Player Reports -->
            <div id="player-reports"></div>

            <!-- Pro Tips -->
            <div class="card tips-card" id="tips-card">
                <h2>&#128161; Pro Tips</h2>
                <div id="tips-list"></div>
            </div>

            <div class="try-again">
                <button class="btn" onclick="resetUI()">&#8635; Analyze Another Game</button>
            </div>
        </section>

        <!-- Error -->
        <section id="error-section" class="error-section hidden">
            <div class="card error-card">
                <h2>&#9888; Analysis Failed</h2>
                <p id="error-message"></p>
                <button class="btn" onclick="resetUI()">Try Again</button>
            </div>
        </section>
    </div>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const uploadSection = document.getElementById('upload-section');
        const loadingSection = document.getElementById('loading-section');
        const resultsSection = document.getElementById('results-section');
        const errorSection = document.getElementById('error-section');

        let currentData = null; // Store last analysis for AI requests

        // --- Drag & Drop ---
        dropZone.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('drag-over'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('drag-over');
            if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
        });
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length) handleFile(e.target.files[0]);
        });

        // --- Upload ---
        async function handleFile(file) {
            showSection('loading');
            const formData = new FormData();
            formData.append('file', file);
            formData.append('focus_player', document.getElementById('focus-player').value);
            try {
                const resp = await fetch('/analyze', { method: 'POST', body: formData });
                const data = await resp.json();
                if (data.success === false && data.error) { showError(data.error); return; }
                if (!resp.ok && !data.analysis) { showError(data.error || 'Unknown error'); return; }
                currentData = data;
                renderResults(data);
                showSection('results');
            } catch (err) {
                showError('Network error: ' + err.message);
            }
        }

        // --- AI Analysis (per-player, per-team, or full game) ---
        async function requestAI(mode, target) {
            const container = document.getElementById('ai-results-container');
            const loading = document.getElementById('ai-loading');
            const loadingText = document.getElementById('ai-loading-text');

            // Show loading
            loadingText.textContent = mode === 'player'
                ? `Analyzing ${target}...`
                : mode === 'team'
                    ? `Analyzing Team ${target}...`
                    : 'Analyzing full game...';
            loading.classList.remove('hidden');

            // Disable clicked button
            const btnId = `ai-btn-${mode}-${target}`.replace(/\s+/g, '_');
            const btn = document.getElementById(btnId);
            if (btn) { btn.disabled = true; btn.textContent = '...'; }

            try {
                const formData = new FormData();
                formData.append('mode', mode);
                formData.append('target', target || '');
                formData.append('focus_player', document.getElementById('focus-player').value);

                const resp = await fetch('/ai-analyze', { method: 'POST', body: formData });
                const data = await resp.json();
                loading.classList.add('hidden');

                if (data.success) {
                    const resultDiv = document.createElement('div');
                    resultDiv.className = 'ai-result-block';

                    const label = mode === 'player' ? target
                        : mode === 'team' ? `Team ${target}`
                        : 'Full Game';

                    const formatted = data.analysis
                        .replace(/## (Dark Age.*)/g, '<h3 class="ai-age dark-age">$1</h3>')
                        .replace(/## (Feudal Age.*)/g, '<h3 class="ai-age feudal-age">$1</h3>')
                        .replace(/## (Castle Age.*)/g, '<h3 class="ai-age castle-age">$1</h3>')
                        .replace(/## (Imperial Age.*)/g, '<h3 class="ai-age imperial-age">$1</h3>')
                        .replace(/## (Verdict.*)/g, '<h3 class="ai-age verdict">$1</h3>')
                        .replace(/## (.*)/g, '<h3 class="ai-age">$1</h3>')
                        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                        .replace(/\n- /g, '\n<li>')
                        .replace(/<li>(.*?)(?=\n|$)/g, '<li>$1</li>')
                        .replace(/(<li>.*<\/li>\n?)+/g, '<ul class="ai-bullets">$&</ul>')
                        .replace(/\n\n/g, '</p><p>')
                        .replace(/\n/g, '<br>');

                    resultDiv.innerHTML = `
                        <div class="ai-result-header">
                            <span class="ai-result-label">${label}</span>
                            <span class="ai-meta">Qwen &bull; ${data.tokens_used} tokens</span>
                        </div>
                        <div class="ai-text"><p>${formatted}</p></div>
                    `;
                    container.appendChild(resultDiv);
                    if (btn) btn.textContent = '\u2705';
                } else {
                    const errDiv = document.createElement('div');
                    errDiv.className = 'ai-result-block ai-error-block';
                    errDiv.innerHTML = `<p class="ai-error-text">${data.error || 'AI analysis failed'}</p>`;
                    container.appendChild(errDiv);
                    if (btn) { btn.textContent = '\u26a1 Retry'; btn.disabled = false; }
                }
            } catch (err) {
                loading.classList.add('hidden');
                if (btn) { btn.textContent = '\u26a1 Retry'; btn.disabled = false; }
            }
        }

        // --- Render ---
        function renderResults(data) {
            const { analysis, coaching } = data;

            // Overview
            const overviewGrid = document.getElementById('overview-grid');
            overviewGrid.innerHTML = `
                <div class="stat-box"><div class="stat-label">Mode</div><div class="stat-value">${analysis.game_type || '?'}</div></div>
                <div class="stat-box"><div class="stat-label">Map</div><div class="stat-value">${analysis.map_name || 'Unknown'}</div></div>
                <div class="stat-box"><div class="stat-label">Duration</div><div class="stat-value">${analysis.duration_display || 'N/A'}</div></div>
                <div class="stat-box"><div class="stat-label">Speed</div><div class="stat-value">${analysis.game_speed || 'Normal'}</div></div>
            `;
            const lobbyParts = [];
            if (analysis.lobby_name) lobbyParts.push(analysis.lobby_name);
            lobbyParts.push(analysis.ranked ? 'Ranked' : 'Unranked');
            lobbyParts.push(`Pop: ${analysis.pop_limit || 200}`);
            const overviewSubtitle = document.createElement('p');
            overviewSubtitle.className = 'overview-subtitle';
            overviewSubtitle.textContent = lobbyParts.join(' \u2022 ');
            overviewGrid.parentElement.appendChild(overviewSubtitle);

            // --- AI Buttons (top) ---
            const aiButtons = document.getElementById('ai-buttons');
            const aiContainer = document.getElementById('ai-results-container');
            aiButtons.innerHTML = '';
            aiContainer.innerHTML = '';

            // Full game button
            aiButtons.innerHTML += `<button class="btn btn-ai btn-ai-full" id="ai-btn-game-all" onclick="requestAI('game','all')">&#9889; Full Game</button>`;

            // Team buttons
            const teams = {};
            coaching.player_reports.forEach(r => {
                const t = r.team || 0;
                if (!teams[t]) teams[t] = [];
                teams[t].push(r);
            });
            Object.keys(teams).forEach(tid => {
                const won = teams[tid].some(m => m.winner);
                const label = `Team ${tid} ${won ? '\u2713' : '\u2717'}`;
                const btnId = `ai-btn-team-${tid}`;
                aiButtons.innerHTML += `<button class="btn btn-ai btn-ai-team ${won ? 'btn-team-won' : 'btn-team-lost'}" id="${btnId}" onclick="requestAI('team','${tid}')">${label}</button>`;
            });

            // Per-player buttons
            coaching.player_reports.forEach(r => {
                const btnId = `ai-btn-player-${r.name}`.replace(/\s+/g, '_');
                const shortName = r.name.length > 12 ? r.name.substring(0, 12) + '..' : r.name;
                aiButtons.innerHTML += `<button class="btn btn-ai btn-ai-player" id="${btnId}" onclick="requestAI('player','${r.name.replace(/'/g, "\\'")}')">${shortName}</button>`;
            });

            // --- Player Reports ---
            const reportsContainer = document.getElementById('player-reports');
            reportsContainer.innerHTML = '';

            Object.entries(teams).forEach(([teamId, members]) => {
                const teamWon = members.some(m => m.winner);
                const teamHeader = document.createElement('div');
                teamHeader.className = `team-header ${teamWon ? 'team-won' : 'team-lost'}`;
                teamHeader.innerHTML = `<h3>Team ${teamId} ${teamWon ? '&#127942; WINNERS' : '&#9876; DEFEATED'}</h3>`;
                reportsContainer.appendChild(teamHeader);

                members.forEach(report => {
                    const card = document.createElement('div');
                    card.className = `card player-card ${report.winner ? 'winner' : 'loser'}`;

                    // Find this player's deep stats
                    const playerIdx = analysis.players.findIndex(p => p.name === report.name);
                    const gs = analysis.game_stats ? analysis.game_stats[String(playerIdx + 1)] : null;

                    let statsBadgesHtml = `
                        <div class="player-stats-badges">
                            ${report.elo ? `<div class="stat-badge elo-badge">ELO: ${report.elo} <span class="tier">${report.elo_tier}</span></div>` : ''}
                            ${report.eapm ? `<div class="stat-badge eapm-badge">EAPM: ${report.eapm}</div>` : ''}
                            ${report.resigned ? '<div class="stat-badge resigned-badge">Resigned</div>' : ''}
                            ${report.meta_tier ? `<div class="stat-badge meta-badge">Meta: ${report.meta_tier}</div>` : ''}
                        </div>
                    `;

                    // --- Deep Game Stats Section ---
                    let deepStatsHtml = '';
                    if (gs) {
                        // Age-up times
                        const at = gs.age_times || {};
                        let ageHtml = '';
                        if (Object.keys(at).length > 0) {
                            const ageParts = [];
                            if (at.feudal) ageParts.push(`<span class="age-badge feudal">Feudal ${at.feudal}m</span>`);
                            if (at.castle) ageParts.push(`<span class="age-badge castle">Castle ${at.castle}m</span>`);
                            if (at.imperial) ageParts.push(`<span class="age-badge imperial">Imp ${at.imperial}m</span>`);
                            ageHtml = `<div class="ds-row"><span class="ds-label">Age-ups</span><div class="ds-ages">${ageParts.join(' ')}</div></div>`;
                        }

                        // Units trained
                        const units = gs.units_trained || {};
                        const unitEntries = Object.entries(units).filter(([n]) => n !== 'Villager').sort((a,b) => b[1]-a[1]);
                        let unitsHtml = '';
                        if (unitEntries.length > 0) {
                            const unitBars = unitEntries.slice(0, 5).map(([name, count]) => {
                                const maxCount = unitEntries[0][1];
                                const pct = Math.round((count / maxCount) * 100);
                                return `<div class="unit-bar"><span class="unit-name">${name}</span><div class="unit-bar-fill" style="width:${pct}%"></div><span class="unit-count">${count}</span></div>`;
                            }).join('');
                            unitsHtml = `<div class="ds-row"><span class="ds-label">Army</span><div class="unit-bars">${unitBars}</div></div>`;
                        }

                        // Villager + military totals
                        const vilCount = gs.villager_count || 0;
                        const milCount = gs.military_count || 0;
                        let totalsHtml = `<div class="ds-row"><span class="ds-label">Production</span><div class="ds-inline"><span class="ds-chip vil-chip">Vils: ${vilCount}</span><span class="ds-chip mil-chip">Military: ${milCount}</span><span class="ds-chip bld-chip">Buildings: ${gs.buildings_placed || 0}</span></div></div>`;

                        // Eco upgrades
                        const eco = gs.eco_upgrades || {};
                        let ecoHtml = '';
                        if (Object.keys(eco).length > 0) {
                            const ecoParts = Object.entries(eco).map(([k, v]) => `${k.replace(/_/g,' ')} @${v}m`).join(', ');
                            ecoHtml = `<div class="ds-row"><span class="ds-label">Eco upgrades</span><span class="ds-text">${ecoParts}</span></div>`;
                        }

                        // Events
                        const events = [];
                        if (gs.town_bells > 0) events.push(`Town bell ${gs.town_bells}x`);
                        if (gs.flares > 0) events.push(`Flares ${gs.flares}x`);
                        if (gs.market_actions > 0) events.push(`Market ${gs.market_actions}x`);
                        if (gs.walls_built > 0) events.push(`Walls ${gs.walls_built}x`);
                        let eventsHtml = events.length > 0 ? `<div class="ds-row"><span class="ds-label">Events</span><span class="ds-text">${events.join(' &bull; ')}</span></div>` : '';

                        deepStatsHtml = `<div class="deep-stats">${ageHtml}${unitsHtml}${totalsHtml}${ecoHtml}${eventsHtml}</div>`;
                    }

                    let strengthsHtml = '';
                    if (report.strengths && report.strengths.length > 0) {
                        strengthsHtml = `<div class="section strengths"><h4>&#10004; Strengths</h4><ul>${report.strengths.map(s => `<li>${s}</li>`).join('')}</ul></div>`;
                    }

                    let improvementsHtml = '';
                    if (report.improvements && report.improvements.length > 0) {
                        improvementsHtml = `
                            <div class="section improvements"><h4>&#128200; Areas to Improve</h4>
                                ${report.improvements.map(imp => `
                                    <div class="improvement-item severity-${imp.severity}">
                                        <div class="imp-header"><span class="imp-area">${imp.area}</span><span class="severity-badge ${imp.severity}">${imp.severity}</span></div>
                                        <p class="imp-message">${imp.message}</p>
                                        <ul class="imp-advice">${imp.advice.map(a => `<li>${a}</li>`).join('')}</ul>
                                    </div>
                                `).join('')}
                            </div>`;
                    }

                    let civAdviceHtml = report.civ_advice ? `<div class="section civ-advice"><h4>&#127983; ${report.civilization} Tip</h4><p>${report.civ_advice}</p></div>` : '';

                    // --- Battle matchups & counter advice ---
                    let battleHtml = '';
                    const ba = report.battle_advice || [];
                    if (ba.length > 0) {
                        let rows = '';
                        ba.forEach(b => {
                            const oppUnits = b.their_top_units.map(([n,c]) => `${n}(${c})`).join(', ');
                            let counterRows = '';
                            b.counters.forEach(c => {
                                counterRows += `<div class="counter-row">
                                    <span class="counter-enemy">${c.enemy_unit} x${c.enemy_count}</span>
                                    <span class="counter-arrow">&rarr;</span>
                                    <span class="counter-unit">Build: ${c.counter}</span>
                                </div>`;
                            });
                            rows += `<div class="battle-matchup">
                                <div class="battle-matchup-header">
                                    <span>vs <strong>${b.opponent}</strong> (${b.opponent_civ}) &mdash; ${b.fight_count} engagements</span>
                                </div>
                                <div class="battle-matchup-body">
                                    <div class="counter-label">They built: ${oppUnits}</div>
                                    ${counterRows}
                                </div>
                            </div>`;
                        });
                        battleHtml = `<div class="section battle-section"><h4>&#9876; Your Battles & Counters</h4>${rows}</div>`;
                    }

                    card.innerHTML = `
                        <div class="player-header">
                            <div class="player-name-row">
                                <span class="player-color" style="background: ${getPlayerColor(report.name, coaching.player_reports.indexOf(report))}"></span>
                                <h3>${report.name}</h3>
                                <span class="civ-tag">${report.civilization}${report.civ_type ? ' (' + report.civ_type + ')' : ''}</span>
                            </div>
                            <div class="grade grade-${report.grade.replace('+', 'plus')}">${report.grade}</div>
                        </div>
                        ${statsBadgesHtml}${deepStatsHtml}${battleHtml}${strengthsHtml}${improvementsHtml}${civAdviceHtml}
                    `;
                    reportsContainer.appendChild(card);
                });
            });

            // Tips
            const tipsList = document.getElementById('tips-list');
            tipsList.innerHTML = '';
            if (coaching.tips) {
                coaching.tips.forEach(tip => {
                    const el = document.createElement('div');
                    el.className = 'tip-item';
                    el.innerHTML = `<span class="tip-category">${tip.category}</span><p>${tip.tip}</p>`;
                    tipsList.appendChild(el);
                });
            }

            // Battle timeline
            const battleDiv = document.getElementById('battle-timeline');
            const engagements = analysis.engagements || [];
            const battleCard = document.getElementById('battle-card');
            if (engagements.length === 0) {
                battleCard.classList.add('hidden');
            } else {
                battleCard.classList.remove('hidden');
                const pidName = {};
                const pidTeam = {};
                analysis.players.forEach((p, i) => { pidName[i+1] = p.name; pidTeam[i+1] = p.team; });

                // Count matchup frequency
                const matchups = {};
                engagements.forEach(e => {
                    const key = [Math.min(e.p1,e.p2), Math.max(e.p1,e.p2)].join('-');
                    matchups[key] = (matchups[key] || 0) + 1;
                });

                // Render matchup summary
                let matchupHtml = '<div class="matchup-summary">';
                Object.entries(matchups).sort((a,b) => b[1]-a[1]).forEach(([key, count]) => {
                    const [p1, p2] = key.split('-').map(Number);
                    const n1 = pidName[p1] || '?', n2 = pidName[p2] || '?';
                    const barW = Math.round((count / engagements.length) * 100);
                    matchupHtml += `<div class="matchup-row">
                        <span class="matchup-names">${n1.substring(0,15)} vs ${n2.substring(0,15)}</span>
                        <div class="matchup-bar-bg"><div class="matchup-bar-fill" style="width:${barW}%"></div></div>
                        <span class="matchup-count">${count}x</span>
                    </div>`;
                });
                matchupHtml += '</div>';

                // Render timeline dots
                const maxTime = Math.max(...engagements.map(e => e.time), 1);
                let dotsHtml = '<div class="battle-dots">';
                engagements.forEach(e => {
                    const left = Math.round((e.time / maxTime) * 100);
                    const n1 = (pidName[e.p1] || '?').substring(0,10);
                    const n2 = (pidName[e.p2] || '?').substring(0,10);
                    dotsHtml += `<div class="battle-dot" style="left:${left}%" title="${e.time}min: ${n1} vs ${n2}"></div>`;
                });
                dotsHtml += `<div class="battle-axis"><span>0 min</span><span>${analysis.duration_display}</span></div>`;
                dotsHtml += '</div>';

                battleDiv.innerHTML = matchupHtml + dotsHtml;
            }
        }

        function getPlayerColor(name, index) {
            const colors = ['#0055ff', '#ff0000', '#00cc00', '#ffcc00', '#00cccc', '#ff00ff', '#ff8800', '#888888'];
            return colors[index % colors.length];
        }

        function showSection(section) {
            uploadSection.classList.add('hidden');
            loadingSection.classList.add('hidden');
            resultsSection.classList.add('hidden');
            errorSection.classList.add('hidden');
            document.getElementById(`${section}-section`).classList.remove('hidden');
        }

        function showError(msg) {
            document.getElementById('error-message').textContent = msg;
            showSection('error');
        }

        function resetUI() {
            fileInput.value = '';
            currentData = null;
            showSection('upload');
        }
    </script>
</body>
</html>
